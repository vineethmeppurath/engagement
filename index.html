<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kavya & Vineeth Engagement</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;700&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --vibrant-gold: #c6a059;
            --deep-maroon: #7b1414;
            --cream-bg-soft: rgba(253, 245, 230, 0.85);
            --text-dark: #331a00;
            --highlight-blue: #004d66;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Lora', serif;
            color: var(--text-dark);
            overflow-x: hidden;
            background-color: #fdf5e6;
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* Outer outline removed as requested */

        .animated-bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
        }

        .flower {
            position: absolute;
            opacity: 0.7;
            border-radius: 50% 20% 50% 20%;
        }

        .flower-1 {
            width: 300px; height: 300px;
            top: -50px; left: -50px;
            background: linear-gradient(135deg, rgba(231, 76, 60, 0.4) 0%, rgba(123, 20, 20, 0.2) 100%);
            animation: floatFlower1 20s infinite ease-in-out;
        }

        .flower-2 {
            width: 250px; height: 250px;
            bottom: 20px; right: -80px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.4) 0%, rgba(198, 160, 89, 0.2) 100%);
            animation: floatFlower2 25s infinite ease-in-out;
            border-radius: 20% 50% 20% 50%;
        }

        .flower-3 {
            width: 150px; height: 150px;
            top: 40%; right: -50px;
            background: linear-gradient(135deg, rgba(0, 77, 102, 0.3) 0%, rgba(0, 102, 128, 0.1) 100%);
            animation: floatFlower3 18s infinite ease-in-out;
        }

        @keyframes floatFlower1 {
            0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
            50% { transform: translate(30px, 20px) rotate(5deg) scale(1.05); }
        }
        @keyframes floatFlower2 {
            0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
            50% { transform: translate(-40px, -20px) rotate(-8deg) scale(0.95); }
        }
        @keyframes floatFlower3 {
            0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
            50% { transform: translate(15px, 60px) rotate(12deg) scale(1.1); }
        }

        .main-wrapper {
            min-height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 40px 20px;
            z-index: 5;
        }

        .content-card {
            width: 100%;
            max-width: 800px;
            text-align: center;
            padding: 80px 40px;
            z-index: 5;
            background: var(--cream-bg-soft);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(198, 160, 89, 0.3);
            position: relative;
        }

        .card-decor {
            position: absolute;
            font-size: 30px;
            color: var(--vibrant-gold);
            opacity: 0.6;
        }
        .decor-top { top: 20px; left: 50%; transform: translateX(-50%); }
        .decor-bottom { bottom: 20px; left: 50%; transform: translateX(-50%); }

        .om { font-size: 55px; margin-bottom: 10px; color: var(--deep-maroon); font-weight: bold;}

        .header-text {
            font-family: 'Cinzel', serif;
            letter-spacing: 4px;
            font-size: clamp(16px, 2.2vw, 20px);
            margin-bottom: 25px;
            color: var(--highlight-blue);
        }

        .names {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(70px, 12vw, 110px);
            line-height: 1;
            margin: 30px 0;
            background: linear-gradient(45deg, var(--deep-maroon) 30%, #e74c3c 60%, var(--vibrant-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: var(--deep-maroon);
            display: inline-block;
        }

        .ampersand {
            font-size: 50px;
            display: block;
            margin: 15px 0;
            color: var(--vibrant-gold);
            -webkit-text-fill-color: var(--vibrant-gold);
        }

        .invite-msg {
            font-size: clamp(18px, 1.8vw, 22px);
            margin: 40px 0;
            font-style: italic;
            line-height: 1.8;
            color: var(--text-dark);
        }

        .month-year {
            font-family: 'Cinzel', serif;
            letter-spacing: 7px;
            font-weight: bold;
            color: var(--deep-maroon);
            font-size: 24px;
        }

        .date-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin: 20px 0;
        }

        .line {
            height: 2px;
            background: var(--vibrant-gold);
            flex: 1;
            max-width: 120px;
        }

        .time-info {
            font-family: 'Cinzel', serif;
            font-size: 22px;
            font-weight: bold;
            color: var(--highlight-blue);
        }

        .big-date {
            font-family: 'Cinzel', serif;
            font-size: clamp(60px, 10vw, 85px);
            border-left: 3px solid var(--deep-maroon);
            border-right: 3px solid var(--deep-maroon);
            padding: 0 35px;
            margin: 15px 0;
            color: var(--deep-maroon);
        }

        .venue {
            margin-top: 50px;
            font-size: 20px;
            color: var(--text-dark);
            line-height: 1.6;
        }

        .venue b {
            font-family: 'Cinzel', serif;
            display: block;
            font-size: 28px;
            margin-bottom: 12px;
            color: var(--deep-maroon);
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 50px 0;
        }

        .unit {
            background: var(--deep-maroon);
            color: white;
            padding: 15px;
            min-width: 90px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .unit span { 
            font-size: 32px; 
            font-weight: bold; 
            display: block; 
            color: var(--vibrant-gold);
        }
        .unit label { 
            font-size: 12px; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            color: rgba(255,255,255,0.8);
        }

        .btn-group {
            margin-top: 40px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .btn {
            background: var(--deep-maroon);
            color: white;
            padding: 18px 36px;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            transition: 0.4s;
            border: 2px solid var(--deep-maroon);
            cursor: pointer;
            letter-spacing: 2px;
            font-size: 16px;
            border-radius: 5px;
        }

        .btn:hover { 
            background: transparent; 
            color: var(--deep-maroon);
            border-color: var(--deep-maroon);
        }

        iframe {
            margin-top: 40px;
            width: 100%;
            height: 350px;
            border: 5px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border-radius: 8px;
        }

        @media (max-width: 600px) {
            .content-card { padding: 60px 20px; }
            .date-row { gap: 10px; flex-wrap: wrap; }
            .line { display: none; }
            .countdown { gap: 10px; }
            .unit { min-width: 60px; padding: 10px; }
            .unit span { font-size: 24px; }
        }

    </style>
</head>
<body>

    <div class="animated-bg-overlay">
        <div class="flower flower-1"></div>
        <div class="flower flower-2"></div>
        <div class="flower flower-3"></div>
    </div>

    <div class="main-wrapper">
        <div class="content-card">
            
            <div class="card-decor decor-top">❀</div>

            <div class="om">ॐ</div>
            
            <p class="header-text">Together with their families</p>
            
            <h1 class="names">
                Kavya <span class="ampersand">&</span> Vineeth
            </h1>

            <p class="invite-msg">
                cordially invite you to join the occasion<br>
                of their engagement ceremony on
            </p>

            <div class="month-year">MAY</div>
            
            <div class="date-row">
                <div class="line"></div>
                <div class="time-info">WEDNESDAY</div>
                <div class="big-date">13</div>
                <div class="time-info">AT 9:45 AM</div>
                <div class="line"></div>
            </div>

            <div class="month-year">2026</div>

            <div class="venue">
                <b>AT SANJO AUDITORIUM</b>
                Opp. St. Joseph’s Syro-Malabar Church,<br>
                Chunangamvely, Aluva
            </div>

            <div class="countdown">
                <div class="unit"><span id="days">00</span><label>Days</label></div>
                <div class="unit"><span id="hours">00</span><label>Hrs</label></div>
                <div class="unit"><span id="mins">00</span><label>Min</label></div>
                <div class="unit"><span id="secs">00</span><label>Sec</label></div>
            </div>

            <div class="btn-group">
                <a href="https://www.google.com/maps/search/?api=1&query=10.0894368,76.3809619" target="_blank" class="btn">Get Directions</a>
            </div>

            <iframe 
                src="https://maps.google.com/maps?q=10.0894368,76.3809619&z=17&output=embed" 
                allowfullscreen="" loading="lazy" title="Sanjo Auditorium Location">
            </iframe>

            <div class="card-decor decor-bottom">❀</div>
        </div>
    </div>

    <script>
        const target = new Date("May 13, 2026 09:45:00").getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const diff = target - now;

            if (diff < 0) {
                document.querySelector(".countdown").innerHTML = "<div class='time-info'>Happening Now!</div>";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("mins").innerText = m.toString().padStart(2, '0');
            document.getElementById("secs").innerText = s.toString().padStart(2, '0');
        }
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
