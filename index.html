<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kavya & Vineeth Engagement</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;700&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* BOTTLE GREEN THEME PALETTE */
            --bottle-green: #00332a;     /* Deep, rich green */
            --forest-green: #014d40;     /* Vibrant secondary green */
            --royal-gold: #d4af37;       /* Metallic gold for accents */
            --soft-gold: #f1d38e;        /* Lighter gold for text gradients */
            --cream-bg-soft: rgba(255, 253, 240, 0.92); /* Warmer cream for the card */
            --text-dark: #00221c;        /* Near-black green for text */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Lora', serif;
            color: var(--text-dark);
            overflow-x: hidden;
            background-color: #fdf5e6;
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* --- BOTTLE GREEN ANIMATED OVERLAY --- */
        .animated-bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
        }

        .flower {
            position: absolute;
            opacity: 0.4;
            border-radius: 50% 20% 50% 20%;
        }

        .flower-1 {
            width: 350px; height: 350px;
            top: -100px; left: -100px;
            background: linear-gradient(135deg, var(--bottle-green) 0%, var(--forest-green) 100%);
            animation: float 22s infinite ease-in-out;
        }

        .flower-2 {
            width: 280px; height: 280px;
            bottom: -50px; right: -50px;
            background: linear-gradient(135deg, var(--forest-green) 0%, var(--bottle-green) 100%);
            animation: float 28s infinite reverse ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
            50% { transform: translate(50px, 30px) rotate(15deg) scale(1.1); }
        }

        /* --- MAIN LAYOUT --- */
        .main-wrapper {
            min-height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 60px 20px;
            z-index: 5;
        }

        .content-card {
            width: 100%;
            max-width: 800px;
            text-align: center;
            padding: 80px 40px;
            background: var(--cream-bg-soft);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 34, 28, 0.25); /* Green-tinted shadow */
            border: 2px solid var(--royal-gold); /* Gold border for the card */
            position: relative;
            animation: cardEntrance 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(40px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* --- TEXT ANIMATIONS --- */
        .animate-text {
            opacity: 0;
            transform: translateY(20px);
            animation: textFadeUp 1s ease-out forwards;
        }

        @keyframes textFadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .delay-1 { animation-delay: 0.5s; }
        .delay-2 { animation-delay: 0.8s; }
        .delay-3 { animation-delay: 1.1s; }
        .delay-4 { animation-delay: 1.4s; }

        .om { 
            font-size: 55px; 
            margin-bottom: 10px; 
            color: var(--bottle-green);
            text-shadow: 1px 1px 2px var(--royal-gold);
        }

        .header-text {
            font-family: 'Cinzel', serif;
            letter-spacing: 4px;
            color: var(--forest-green);
            font-weight: 700;
        }

        .names {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(75px, 12vw, 115px);
            line-height: 1.1;
            margin: 20px 0;
            background: linear-gradient(45deg, var(--bottle-green), var(--forest-green), var(--royal-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            animation: namePulse 4s infinite ease-in-out;
        }

        @keyframes namePulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.03); opacity: 0.9; }
        }

        .ampersand {
            font-size: 45px;
            color: var(--royal-gold);
            -webkit-text-fill-color: var(--royal-gold);
            display: block;
            margin: 10px 0;
        }

        .invite-msg {
            font-size: clamp(18px, 1.8vw, 22px);
            margin: 40px 0;
            font-style: italic;
            color: var(--bottle-green);
        }

        /* --- DATE & VENUE --- */
        .month-year {
            font-family: 'Cinzel', serif;
            letter-spacing: 6px;
            font-weight: bold;
            color: var(--bottle-green);
        }

        .date-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
        }

        .line {
            height: 2px;
            background: var(--royal-gold);
            flex: 1;
            max-width: 100px;
        }

        .big-date {
            font-family: 'Cinzel', serif;
            font-size: clamp(60px, 10vw, 85px);
            border-left: 3px solid var(--royal-gold);
            border-right: 3px solid var(--royal-gold);
            padding: 0 30px;
            color: var(--bottle-green);
            font-weight: 700;
        }

        .venue b {
            font-family: 'Cinzel', serif;
            display: block;
            font-size: 28px;
            margin-bottom: 12px;
            color: var(--bottle-green);
            letter-spacing: 2px;
        }

        /* --- COUNTDOWN: BOTTLE GREEN STYLE --- */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 50px 0;
        }

        .unit {
            background: var(--bottle-green);
            color: white;
            padding: 18px;
            min-width: 95px;
            border-radius: 15px;
            border: 1px solid var(--royal-gold);
            box-shadow: 0 8px 20px rgba(0, 51, 42, 0.3);
            transition: 0.3s ease;
        }

        .unit:hover { transform: translateY(-8px); border-color: var(--soft-gold); }

        .unit span { font-size: 32px; font-weight: bold; color: var(--royal-gold); display: block; }
        .unit label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--soft-gold); }

        /* --- BUTTONS & MAP --- */
        .btn {
            background: var(--bottle-green);
            color: var(--soft-gold);
            padding: 18px 40px;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            border: 2px solid var(--royal-gold);
            border-radius: 4px; /* Classier rectangular look */
            transition: 0.4s;
            display: inline-block;
            letter-spacing: 2px;
            box-shadow: 0 10px 20px rgba(0, 34, 28, 0.2);
        }

        .btn:hover {
            background: var(--forest-green);
            color: white;
            transform: scale(1.05);
        }

        iframe {
            margin-top: 40px;
            width: 100%;
            height: 350px;
            border: 4px solid var(--royal-gold);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        @media (max-width: 600px) {
            .content-card { padding: 50px 20px; }
            .countdown { gap: 10px; flex-wrap: wrap; }
            .unit { min-width: 75px; padding: 12px; }
            .line { display: none; }
        }
    </style>
</head>
<body>

    <div class="animated-bg-overlay">
        <div class="flower flower-1"></div>
        <div class="flower flower-2"></div>
    </div>

    <div class="main-wrapper">
        <div class="content-card">
            
            <div class="card-decor decor-top">❀</div>

            <div class="animate-text">
                <div class="om">ॐ</div>
                <p class="header-text">Together with their families</p>
            </div>
            
            <div class="animate-text delay-1">
                <h1 class="names">
                    Kavya <span class="ampersand">&</span> Vineeth
                </h1>
            </div>

            <div class="animate-text delay-2">
                <p class="invite-msg">
                    cordially invite you to join the occasion<br>
                    of their engagement ceremony on
                </p>
            </div>

            <div class="animate-text delay-3">
                <div class="month-year">MAY 2026</div>
                <div class="date-row">
                    <div class="line"></div>
                    <div class="time-info" style="font-family: 'Cinzel'; font-weight: bold; color: var(--forest-green);">WEDNESDAY</div>
                    <div class="big-date">13</div>
                    <div class="time-info" style="font-family: 'Cinzel'; font-weight: bold; color: var(--forest-green);">9:45 AM</div>
                    <div class="line"></div>
                </div>
            </div>

            <div class="animate-text delay-4">
                <div class="venue">
                    <b>AT SANJO AUDITORIUM</b>
                    Opp. St. Joseph’s Syro-Malabar Church,<br>
                    Chunangamvely, Aluva
                </div>

                <div class="countdown">
                    <div class="unit"><span id="days">00</span><label>Days</label></div>
                    <div class="unit"><span id="hours">00</span><label>Hrs</label></div>
                    <div class="unit"><span id="mins">00</span><label>Min</label></div>
                    <div class="unit"><span id="secs">00</span><label>Sec</label></div>
                </div>

                <div class="btn-group">
                    <a href="https://www.google.com/maps/dir/?api=1&destination=10.0894368,76.3809619" target="_blank" class="btn">Get Directions</a>
                </div>

                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3928.165213615967!2d76.378773214795!3d10.0894368!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3b08069f9b54c793%3A0x6338b25110d7a18f!2sSanjo%20Auditorium!5e0!3m2!1sen!2sin!4v1711234567890!5m2!1sen!2sin" 
                    allowfullscreen="" loading="lazy">
                </iframe>
            </div>

            <div class="card-decor decor-bottom">❀</div>
        </div>
    </div>

    <script>
        const target = new Date("May 13, 2026 09:45:00").getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const diff = target - now;

            if (diff < 0) {
                document.querySelector(".countdown").innerHTML = "<div class='venue'><b>Happening Now!</b></div>";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("mins").innerText = m.toString().padStart(2, '0');
            document.getElementById("secs").innerText = s.toString().padStart(2, '0');
        }
        
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
