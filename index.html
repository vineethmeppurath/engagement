<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kavya & Vineeth - Engagement</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --emerald: #085a31;
            --emerald-light: #128249;
            --gold: #d1ccb0;
            --silver: #dce1e3;
            --off-white: #f5f9f6;
            --text-dark: #042415;
            --text-muted: #5e7a6d;
            --glass-bg: rgba(255, 255, 255, 0.5);
            --glass-border: rgba(255, 255, 255, 0.7);
            --glass-shadow: 0 8px 32px rgba(8, 90, 49, 0.05);
            --font-main: 'Outfit', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%;
            min-height: 100vh;
            font-family: var(--font-main);
            color: var(--text-dark);
            background-color: #fdfdfd;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- ADVANCED DYNAMIC BACKGROUND --- */
        .bg-shapes {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: #ffffff;
        }
        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 15s infinite ease-in-out alternate;
        }
        .shape-1 {
            width: 500px; height: 500px;
            background: #eef2e7; /* Subtle pale gold */
            top: -150px; left: -150px;
            animation-delay: 0s;
        }
        .shape-2 {
            width: 600px; height: 600px;
            background: #dff0e6; /* Pale dynamic emerald */
            bottom: -200px; right: -150px;
            animation-delay: -5s;
        }
        .shape-3 {
            width: 400px; height: 400px;
            background: #fdfcf9; /* Silver highlight */
            top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            animation-duration: 20s;
            opacity: 0.6;
        }

        @keyframes float {
            0% { transform: translateY(0) translateX(0) scale(1); }
            50% { transform: translateY(-40px) translateX(30px) scale(1.05); }
            100% { transform: translateY(30px) translateX(-40px) scale(0.95); }
        }

        /* --- MAIN LAYOUT --- */
        .main-wrapper {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .bento-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            perspective: 1000px; /* For 3D transforms */
        }

        /* --- GLASSMORPHISM CARDS --- */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            box-shadow: var(--glass-shadow);
            padding: 30px;
            opacity: 0;
            transform: translateY(30px);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease;
        }
        .glass-card:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 16px 40px rgba(8, 90, 49, 0.08);
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Staggered Animations */
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }

        /* --- HEADER SECTION --- */
        .header-badge {
            display: inline-block;
            background: rgba(8, 90, 49, 0.06);
            color: var(--emerald);
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            margin-bottom: 25px;
            box-shadow: inset 0 0 0 1px rgba(8, 90, 49, 0.1);
        }

        .names-wrapper {
            margin-bottom: 10px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .names {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(55px, 12vw, 55px);
            line-height: 1.1;
            background: linear-gradient(135deg, var(--emerald), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            padding: 10px;
            font-weight: bold;
        }

        .rings-dynamic {
            width: 38px;
            vertical-align: middle;
            animation: pulse-ring 4s infinite ease-in-out;
            filter: drop-shadow(0 6px 12px rgba(8,90,49,0.15));
        }

        @keyframes pulse-ring {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.8; }
            50% { transform: scale(1.1) rotate(6deg); opacity: 1; }
        }

        .invite-text {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-top: 15px;
            font-weight: 400;
        }

        /* --- BENTO GRID ROWS --- */
        .bento-row {
            display: flex;
            gap: 16px;
        }
        .bento-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
        }

        /* Date Block */
        .date-highlight {
            font-size: 3.8rem;
            font-weight: 700;
            line-height: 1;
            color: var(--emerald);
            margin: 8px 0;
            background: linear-gradient(180deg, var(--emerald), var(--emerald-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .date-month {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--gold);
        }
        .time-badge {
            margin-top: 12px;
            background: var(--off-white);
            border: 1px solid var(--glass-border);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        /* Countdown Grid inside Bento */
        .countdown-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
        }
        .countdown-item {
            text-align: center;
            background: rgba(255,255,255,0.7);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 16px 10px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }
        .countdown-item:hover {
            background: #ffffff;
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 8px 20px rgba(8, 90, 49, 0.05);
        }
        .countdown-item span {
            display: block;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--emerald);
            margin-bottom: 2px;
            line-height: 1;
        }
        .countdown-item label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            font-weight: 600;
        }

        /* --- VENUE & MAP --- */
        .venue-card {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 24px;
            text-align: left;
        }
        .venue-icon {
            width: 56px;
            height: 56px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--emerald-light), var(--emerald));
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(8, 90, 49, 0.2);
            flex-shrink: 0;
            font-size: 1.5rem;
            font-weight: 300;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .venue-card:hover .venue-icon {
            transform: scale(1.1) rotate(5deg);
        }
        .venue-info h3 {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text-dark);
            letter-spacing: 0.2px;
        }
        .venue-info p {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
            font-weight: 400;
        }

        /* Map Embed */
        .map-wrapper {
            width: 100%;
            height: 200px;
            border-radius: 24px;
            overflow: hidden;
            border: 3px solid white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            position: relative;
            margin-top: 6px;
        }
        iframe { width: 100%; height: 100%; border: none; }
        
        .map-overlay {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: var(--emerald);
            padding: 12px 28px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-decoration: none;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid var(--glass-border);
            white-space: nowrap;
        }
        .map-overlay:hover {
            transform: translateX(-50%) translateY(-4px) scale(1.03);
            background: var(--emerald);
            color: white;
            box-shadow: 0 12px 30px rgba(8, 90, 49, 0.25);
            border-color: var(--emerald);
        }

        @media (max-width: 480px) {
            .bento-row { flex-direction: row; gap: 10px; }
            .date-highlight { font-size: 2.4rem; }
            .countdown-wrapper { gap: 8px; }
            .countdown-item { padding: 12px 5px; }
            .countdown-item span { font-size: 1.3rem; }
            .glass-card { padding: 20px 10px; }
            .venue-card { flex-direction: column; align-items: flex-start; gap: 15px; padding: 20px 15px; }
        }
    </style>
</head>
<body>

    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="main-wrapper">
        <div class="bento-container">
            
            <!-- Hero Card -->
            <div class="glass-card delay-1" style="text-align: center;">
                <div class="header-badge">Engagement Invitation</div>
                <div class="names-wrapper">
                    <span class="names">Kavya</span>
                    <img src="rings.png" alt="Rings" class="rings-dynamic">
                    <span class="names">Vineeth</span>
                </div>
                <p class="invite-text">Joyfully invite you to celebrate the beginning<br>of their new journey together.</p>
            </div>

            <!-- Date & Timer Row -->
            <div class="bento-row">
                <!-- Date -->
                <div class="glass-card bento-col delay-2">
                    <div class="date-month">MAY 2026</div>
                    <div class="date-highlight">13</div>
                    <div class="date-month" style="font-size:0.75rem; letter-spacing:1px; color: var(--text-muted);">Wednesday</div>
                    <div class="time-badge">9:45 AM</div>
                </div>

                <!-- Countdown -->
                <div class="glass-card bento-col delay-3" style="padding: 20px;">
                    <div id="countdown" class="countdown-wrapper">
                        <div class="countdown-item"><span id="days">00</span><label>Days</label></div>
                        <div class="countdown-item"><span id="hours">00</span><label>Hrs</label></div>
                        <div class="countdown-item"><span id="mins">00</span><label>Min</label></div>
                        <div class="countdown-item"><span id="secs">00</span><label>Sec</label></div>
                    </div>
                </div>
            </div>

            <!-- Venue & Context -->
            <div class="glass-card venue-card delay-4" style="flex-direction: column; align-items: stretch; padding: 24px;">
                
                <div style="display: flex; gap: 20px; align-items: center; width: 100%; padding-bottom: 10px;">
                    <div class="venue-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                    </div>
                    <div class="venue-info">
                        <h3>Sanjo Auditorium</h3>
                        <p>Opp. St. Joseph’s Church,<br>Chunangamvely, Aluva</p>
                    </div>
                </div>

                <div class="map-wrapper">
                    <iframe src="https://maps.google.com/maps?q=10.0897177,76.381047&hl=en&z=17&output=embed" loading="lazy"></iframe>
                    <a href="https://www.google.com/maps/dir/?api=1&destination=10.0897177,76.381047" target="_blank" class="map-overlay">
                        Get Directions
                    </a>
                </div>

            </div>

        </div>
    </div>

    <script>
        const targetDate = new Date("May 13, 2026 09:45:00").getTime();
        const countdownEl = document.getElementById("countdown");

        function updateTimer() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff < 0) {
                countdownEl.innerHTML = "<div style='grid-column: span 2; text-align: center; color: var(--emerald); font-weight: 700; padding: 30px 0; font-size: 1.4rem;'>Happening Now!</div>";
                return;
            }

            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById("mins").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById("secs").innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }
        
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
