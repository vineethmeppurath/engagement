<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kavya & Vineeth Engagement</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;700&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --vibrant-gold: #c6a059;
            --deep-maroon: #7b1414;
            --cream-bg-soft: rgba(253, 245, 230, 0.88);
            --text-dark: #331a00;
            --highlight-blue: #004d66;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Lora', serif;
            color: var(--text-dark);
            overflow-x: hidden;
            background-color: #fdf5e6;
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* --- BACKGROUND ANIMATIONS --- */
        .animated-bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
        }

        .flower {
            position: absolute;
            opacity: 0.6;
            border-radius: 50% 20% 50% 20%;
        }

        .flower-1 {
            width: 300px; height: 300px;
            top: -50px; left: -50px;
            background: linear-gradient(135deg, rgba(231, 76, 60, 0.3) 0%, rgba(123, 20, 20, 0.1) 100%);
            animation: float 20s infinite ease-in-out;
        }

        .flower-2 {
            width: 250px; height: 250px;
            bottom: 20px; right: -80px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.3) 0%, rgba(198, 160, 89, 0.1) 100%);
            animation: float 25s infinite reverse ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(40px, 20px) rotate(10deg); }
        }

        /* --- MAIN LAYOUT --- */
        .main-wrapper {
            min-height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 60px 20px;
            z-index: 5;
        }

        .content-card {
            width: 100%;
            max-width: 800px;
            text-align: center;
            padding: 80px 40px;
            background: var(--cream-bg-soft);
            border-radius: 30px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(198, 160, 89, 0.3);
            position: relative;
            /* Initial state for card reveal */
            animation: cardEntrance 1.5s ease-out forwards;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- TEXT ANIMATIONS --- */
        .animate-text {
            opacity: 0;
            transform: translateY(20px);
            animation: textFadeUp 1s ease-out forwards;
        }

        @keyframes textFadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .delay-1 { animation-delay: 0.5s; }
        .delay-2 { animation-delay: 0.8s; }
        .delay-3 { animation-delay: 1.1s; }
        .delay-4 { animation-delay: 1.4s; }

        .om { 
            font-size: 55px; 
            margin-bottom: 10px; 
            color: var(--deep-maroon);
            text-shadow: 0 0 15px rgba(123, 20, 20, 0.2);
        }

        .names {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(70px, 12vw, 110px);
            line-height: 1.1;
            margin: 20px 0;
            background: linear-gradient(45deg, var(--deep-maroon), #e74c3c, var(--vibrant-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1));
            animation: namePulse 3s infinite ease-in-out;
        }

        @keyframes namePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .ampersand {
            font-size: 40px;
            color: var(--vibrant-gold);
            -webkit-text-fill-color: var(--vibrant-gold);
            display: block;
            margin: 10px 0;
        }

        /* --- DATE & VENUE --- */
        .date-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 25px 0;
        }

        .line {
            height: 2px;
            background: var(--vibrant-gold);
            flex: 1;
            max-width: 80px;
        }

        .big-date {
            font-family: 'Cinzel', serif;
            font-size: clamp(50px, 8vw, 75px);
            border-left: 3px solid var(--deep-maroon);
            border-right: 3px solid var(--deep-maroon);
            padding: 0 25px;
            color: var(--deep-maroon);
        }

        .venue b {
            font-family: 'Cinzel', serif;
            display: block;
            font-size: 26px;
            margin-bottom: 10px;
            color: var(--deep-maroon);
            letter-spacing: 1px;
        }

        /* --- COUNTDOWN --- */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 40px 0;
        }

        .unit {
            background: var(--deep-maroon);
            color: white;
            padding: 15px;
            min-width: 85px;
            border-radius: 12px;
            transition: transform 0.3s ease;
        }

        .unit:hover { transform: translateY(-5px); }

        .unit span { font-size: 28px; font-weight: bold; color: var(--vibrant-gold); display: block; }
        .unit label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; }

        /* --- BUTTONS & MAP --- */
        .btn {
            background: var(--deep-maroon);
            color: white;
            padding: 16px 32px;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            border: 2px solid var(--deep-maroon);
            border-radius: 50px;
            transition: 0.3s;
            display: inline-block;
            box-shadow: 0 5px 15px rgba(123, 20, 20, 0.3);
        }

        .btn:hover {
            background: transparent;
            color: var(--deep-maroon);
            box-shadow: 0 8px 20px rgba(123, 20, 20, 0.4);
        }

        iframe {
            margin-top: 40px;
            width: 100%;
            height: 300px;
            border: 5px solid white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        @media (max-width: 600px) {
            .content-card { padding: 50px 20px; }
            .countdown { gap: 8px; }
            .unit { min-width: 70px; padding: 10px; }
            .line { display: none; }
        }
    </style>
</head>
<body>

    <div class="animated-bg-overlay">
        <div class="flower flower-1"></div>
        <div class="flower flower-2"></div>
    </div>

    <div class="main-wrapper">
        <div class="content-card">
            
            <div class="animate-text">
                <div class="om">ॐ</div>
                <p class="header-text" style="font-family: 'Cinzel'; letter-spacing: 3px;">Together with their families</p>
            </div>
            
            <div class="animate-text delay-1">
                <h1 class="names">
                    Kavya <span class="ampersand">&</span> Vineeth
                </h1>
            </div>

            <div class="animate-text delay-2">
                <p class="invite-msg">
                    cordially invite you to join the occasion<br>
                    of their engagement ceremony on
                </p>
            </div>

            <div class="animate-text delay-3">
                <div class="month-year" style="font-family: 'Cinzel'; font-weight: bold; letter-spacing: 5px; color: var(--deep-maroon);">MAY 2026</div>
                <div class="date-row">
                    <div class="line"></div>
                    <div class="time-info" style="font-family: 'Cinzel'; font-weight: bold;">WEDNESDAY</div>
                    <div class="big-date">13</div>
                    <div class="time-info" style="font-family: 'Cinzel'; font-weight: bold;">9:45 AM</div>
                    <div class="line"></div>
                </div>
            </div>

            <div class="animate-text delay-4">
                <div class="venue">
                    <b>AT SANJO AUDITORIUM</b>
                    Opp. St. Joseph’s Syro-Malabar Church,<br>
                    Chunangamvely, Aluva
                </div>

                <div class="countdown">
                    <div class="unit"><span id="days">00</span><label>Days</label></div>
                    <div class="unit"><span id="hours">00</span><label>Hrs</label></div>
                    <div class="unit"><span id="mins">00</span><label>Min</label></div>
                    <div class="unit"><span id="secs">00</span><label>Sec</label></div>
                </div>

                <div class="btn-group">
                    <a href="https://www.google.com/maps/dir/?api=1&destination=10.0894368,76.3809619" target="_blank" class="btn">Get Directions</a>
                </div>

                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3928.552438515096!2d76.37877322588383!3d10.089442121332822!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3b08068763567793%3A0xc33118933b91a76!2sSanjo%20Auditorium!5e0!3m2!1sen!2sin!4v1711234567890!5m2!1sen!2sin" 
                    allowfullscreen="" loading="lazy">
                </iframe>
            </div>
        </div>
    </div>

    <script>
        // Target Date
        const target = new Date("May 13, 2026 09:45:00").getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const diff = target - now;

            if (diff < 0) {
                document.querySelector(".countdown").innerHTML = "<div class='venue'><b>Happening Now!</b></div>";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("mins").innerText = m.toString().padStart(2, '0');
            document.getElementById("secs").innerText = s.toString().padStart(2, '0');
        }
        
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
