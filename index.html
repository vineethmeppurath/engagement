<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kavya & Vineeth - Engagement</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;700&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bottle-green: #00332a;
            --royal-gold: #d4af37;
            --soft-gold: #f1d38e;
            --cream-bg: rgba(255, 253, 240, 0.96);
            --text-dark: #00221c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%;
            font-family: 'Lora', serif;
            color: var(--text-dark);
            background-color: var(--bottle-green);
            overflow-x: hidden;
        }

        .animated-bg {
          position: fixed;
          top: 0;
          left: 0; 
          width: 100vw; 
          height: 100vh;
          background-image: url('bg.png') !important; /* Added !important to override other styles */
          background-size: cover;
          background-position: center center;
          background-repeat: no-repeat;
          z-index: -1;
          animation: slowPan 25s infinite alternate ease-in-out;
      }

        @keyframes slowPan { from { transform: scale(1); } to { transform: scale(1.15); } }

        .main-wrapper {
            min-height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 15px; 
            position: relative;
        }

        .content-card {
            width: 100%;
            max-width: 420px;
            text-align: center;
            padding: 35px 20px;
            background: var(--cream-bg);
            border-radius: 20px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.5);
            border: 1.5px solid var(--royal-gold);
            position: relative;
        }

        .animate-text {
            opacity: 0;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .delay-1 { animation-delay: 0.4s; }
        .delay-2 { animation-delay: 0.8s; }
        .delay-3 { animation-delay: 1.2s; }
        .delay-4 { animation-delay: 1.6s; }
        .delay-5 { animation-delay: 2.0s; }
        .delay-6 { animation-delay: 2.4s; }
        .delay-7 { animation-delay: 2.8s; }

        .names-container {
            width: 100%;
            padding: 15px 5px; 
            margin: 5px 0;
            overflow: visible; 
            display: block;
        }

        .names {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(38px, 10vw, 50px); 
            line-height: 1.4; 
            background: linear-gradient(45deg, var(--bottle-green), var(--royal-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            padding: 0 15px; 
            animation: pulse 3s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        .om { font-size: 26px; color: var(--bottle-green); margin-bottom: 8px; }
        .header-text { font-family: 'Cinzel', serif; letter-spacing: 2px; font-size: 0.75rem; color: #666; font-weight: 700; }
        .ampersand { font-size: 30px; color: var(--royal-gold); -webkit-text-fill-color: var(--royal-gold); }
        .invite-msg { font-size: 0.85rem; margin: 15px 0; font-style: italic; color: #444; line-height: 1.6; }

        .month-year { font-family: 'Cinzel', serif; letter-spacing: 4px; font-weight: bold; font-size: 1rem; color: var(--bottle-green); }
        .date-row { display: flex; justify-content: center; align-items: center; gap: 12px; margin: 12px 0; }
        .big-date { font-family: 'Cinzel', serif; font-size: 2.6rem; border-left: 2.5px solid var(--royal-gold); border-right: 2.5px solid var(--royal-gold); padding: 0 18px; color: var(--bottle-green); font-weight: 700; line-height: 1; }
        .time-info { font-size: 0.75rem; font-family: 'Cinzel'; font-weight: bold; color: var(--bottle-green); width: 85px; }

        .venue { font-size: 0.85rem; line-height: 1.5; color: #333; margin: 20px 0; }
        .venue b { font-family: 'Cinzel', serif; display: block; font-size: 1.1rem; margin-bottom: 6px; color: var(--bottle-green); }

        .countdown { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; flex-wrap: wrap; }
        .unit { background: var(--bottle-green); color: white; padding: 8px 5px; min-width: 65px; border-radius: 10px; border: 1px solid var(--royal-gold); }
        .unit span { font-size: 1.2rem; font-weight: bold; color: var(--royal-gold); display: block; }
        .unit label { font-size: 0.55rem; text-transform: uppercase; color: var(--soft-gold); letter-spacing: 1px; }

        .btn-box { margin-bottom: 18px; }
        .btn {
            background: var(--bottle-green);
            color: var(--soft-gold);
            padding: 14px 28px;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            font-weight: bold;
            border: 1.5px solid var(--royal-gold);
            border-radius: 6px;
            display: inline-block;
            transition: 0.3s ease;
        }

        .map-container {
            width: 100%;
            height: 180px;
            border: 2px solid var(--royal-gold);
            border-radius: 12px;
            overflow: hidden;
            margin-top: 10px;
        }
        iframe { width: 100%; height: 100%; border: none; }

        @media (max-width: 380px) {
            .names { font-size: 36px; }
            .content-card { padding: 25px 15px; }
            .big-date { font-size: 2.2rem; padding: 0 12px; }
        }
    </style>
</head>
<body>

    <div class="animated-bg"></div>

    <div class="main-wrapper">
        <main class="content-card">
            
            <div class="animate-text">
                <div class="om">ॐ</div>
                <p class="header-text">Together with their families</p>
            </div>

            <div class="animate-text delay-1">
                <div class="names-container">
                    <h1 class="names">
                        Kavya <span class="ampersand">&</span> Vineeth
                    </h1>
                </div>
            </div>

            <div class="animate-text delay-2">
                <p class="invite-msg">cordially invite you to join them<br>at their engagement ceremony on</p>
            </div>

            <div class="animate-text delay-3">
                <div class="month-year">MAY 2026</div>
                <div class="date-row">
                    <div class="time-info">WEDNESDAY</div>
                    <div class="big-date">13</div>
                    <div class="time-info">9:45 AM</div>
                </div>
            </div>

            <div class="venue animate-text delay-4">
                <b>AT SANJO AUDITORIUM</b>
                Opp. St. Joseph’s Church,<br>
                Chunangamvely, Aluva
            </div>

            <div id="countdown" class="countdown animate-text delay-5">
                <div class="unit"><span id="days">00</span><label>Days</label></div>
                <div class="unit"><span id="hours">00</span><label>Hrs</label></div>
                <div class="unit"><span id="mins">00</span><label>Min</label></div>
                <div class="unit"><span id="secs">00</span><label>Sec</label></div>
            </div>

            <div class="btn-box animate-text delay-6">
                <a href="https://www.google.com/maps/dir/?api=1&destination=10.089663,76.3810593" target="_blank" class="btn">Get Directions</a>
            </div>

            <div class="animate-text delay-7">
                <div class="map-container">
                    <iframe 
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3928.529202537233!2d76.3784843753238!3d10.089668371302832!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3b08090063cf1ed7%3A0x6fce48e911dcbd1d!2sJoy%20Memorial%20Parish%20Hall!5e0!3m2!1sen!2sin!4v1712739600000!5m2!1sen!2sin" 
                        allowfullscreen="" 
                        loading="lazy">
                    </iframe>
                </div>
            </div>
        </main>
    </div>

    <script>
        const targetDate = new Date("May 13, 2026 09:45:00").getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff < 0) {
                document.getElementById("countdown").innerHTML = "<b style='color:var(--bottle-green)'>HAPPENING NOW!</b>";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("mins").innerText = m.toString().padStart(2, '0');
            document.getElementById("secs").innerText = s.toString().padStart(2, '0');
        }
        
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
