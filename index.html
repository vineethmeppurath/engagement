<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kavya & Vineeth - Engagement</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;700&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bottle-green: #00332a;
            --royal-gold: #d4af37;
            --soft-gold: #f1d38e;
            --cream-bg: rgba(255, 253, 240, 0.90);
            --text-dark: #00221c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* --- IMMERSIVE FIXED BACKGROUND WITH KEN BURNS EFFECT --- */
        body, html {
            height: 100%; width: 100%;
            font-family: 'Lora', serif;
            color: var(--text-dark);
            overflow: hidden; /* Fixes screen for mobile */
            background-color: #fdf5e6;
        }

        .animated-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            z-index: -1;
            animation: slowPan 25s infinite alternate ease-in-out;
        }

        @keyframes slowPan { from { transform: scale(1); } to { transform: scale(1.1); } }

        /* --- RESPONSIVE CONTAINER --- */
        .main-wrapper {
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            z-index: 5;
            position: relative;
        }

        .content-card {
            width: 100%;
            max-width: 500px;
            max-height: 98vh; /* Keeps card within view */
            text-align: center;
            padding: 30px 20px;
            background: var(--cream-bg);
            border-radius: 20px;
            box-shadow: 0 15px 45px rgba(0, 34, 28, 0.2);
            border: 1.5px solid var(--royal-gold);
            overflow: hidden; /* Prevent scrolling inside card unless absolutely necessary */
            animation: cardEntrance 1.2s ease-out;
            position: relative;
        }

        @keyframes cardEntrance { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }

        .om { font-size: 30px; color: var(--bottle-green); margin-bottom: 3px; }
        .header-text { font-family: 'Cinzel', serif; letter-spacing: 2px; font-size: 0.7rem; color: #666; font-weight: 700; }

        /* --- CRITICAL FIX FOR SCRIPT NAMES CLIPPING --- */
        .names {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(50px, 12vw, 68px);
            line-height: 1.5; /* Large line height ensures script loops aren't clipped top/bottom */
            background: linear-gradient(45deg, var(--bottle-green), var(--royal-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            overflow: visible; /* Standard visible just in case */
        }

        .names span { display: inline-block; padding: 15px 10px; /* Crucial padding prevents clipping on the left and right sides */ }

        .ampersand { font-size: 25px; color: var(--royal-gold); -webkit-text-fill-color: var(--royal-gold); }

        .invite-msg { font-size: 0.8rem; margin: 10px 0; font-style: italic; color: #666; }

        /* --- COMPACT DATE & VENUE --- */
        .month-year { font-family: 'Cinzel', serif; letter-spacing: 4px; font-weight: bold; font-size: 0.9rem; }
        .date-row { display: flex; justify-content: center; align-items: center; gap: 10px; margin: 10px 0; }
        .big-date { font-family: 'Cinzel', serif; font-size: 2.8rem; border-left: 2px solid var(--royal-gold); border-right: 2px solid var(--royal-gold); padding: 0 15px; color: var(--bottle-green); font-weight: 700; }
        .time-info { font-size: 0.7rem; font-family: 'Cinzel'; font-weight: bold; color: var(--bottle-green); }

        /* --- INTEGRATED SYRO-MALABAR CHURCH ADDRESS --- */
        .venue { font-size: 0.8rem; line-height: 1.4; color: #555; margin-bottom: 20px;}
        .venue b { font-family: 'Cinzel', serif; display: block; font-size: 1.2rem; margin-bottom: 5px; color: var(--bottle-green); }

        /* --- COMPACT COUNTDOWN --- */
        .countdown { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; }
        .unit { background: var(--bottle-green); color: white; padding: 10px; min-width: 65px; border-radius: 10px; border: 1px solid var(--royal-gold); }
        .unit span { font-size: 1.3rem; font-weight: bold; color: var(--royal-gold); display: block; }
        .unit label { font-size: 0.5rem; text-transform: uppercase; color: var(--soft-gold); letter-spacing: 1px; }

        /* --- MAP & BUTTONS --- */
        .btn-box { margin-bottom: 15px; }
        .btn {
            background: var(--bottle-green);
            color: var(--soft-gold);
            padding: 12px 30px;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            font-weight: bold;
            border: 1.5px solid var(--royal-gold);
            border-radius: 4px;
            display: inline-block;
            transition: 0.3s;
        }
        .btn:hover { background: #00221c; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        /* Compact map iframe */
        iframe {
            width: 100%;
            height: 160px;
            border: 2px solid var(--royal-gold);
            border-radius: 10px;
        }

        /* Responsive Tweaks for Smaller Heights */
        @media (max-height: 700px) {
            .card { padding: 20px 15px; }
            .names { font-size: 45px; }
            .om { font-size: 25px; }
            .big-date { font-size: 2.2rem; }
            iframe { height: 130px; }
        }
    </style>
</head>
<body>

    <div class="animated-bg"></div>

    <div class="main-wrapper">
        <main class="content-card">
            
            <div class="animate-text">
                <div class="om">ॐ</div>
                <p class="header-text">Together with their families</p>
            </div>
            
            <div class="animate-text delay-1">
                <h1 class="names">
                    <span>Kavya <span class="ampersand">&</span> Vineeth</span>
                </h1>
            </div>

            <div class="animate-text delay-2">
                <p class="invite-msg">cordially invite you to join them<br>at their engagement ceremony on</p>
            </div>

            <div class="animate-text delay-3">
                <div class="month-year">MAY 2026</div>
                <div class="date-row">
                    <div class="time-info">WEDNESDAY</div>
                    <div class="big-date">13</div>
                    <div class="time-info">9:45 AM</div>
                </div>
            </div>

            <div class="venue">
                <b>AT SANJO AUDITORIUM</b>
                Opp. St. Joseph’s Syro-Malabar Church,<br>
                Chunangamvely, Aluva
            </div>

            <div id="countdown" class="countdown">
                <div class="unit"><span id="days">00</span><label>Days</label></div>
                <div class="unit"><span id="hours">00</span><label>Hrs</label></div>
                <div class="unit"><span id="mins">00</span><label>Min</label></div>
                <div class="unit"><span id="secs">00</span><label>Sec</label></div>
            </div>

            <div class="btn-box">
                <a href="https://www.google.com/maps/dir/?api=1&destination=10.089663,76.3810593" 
                   target="_blank" class="btn">Get Directions</a>
            </div>

            <div class="map-container animate delay-3">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3928.3475!2d76.3809619!3d10.0894368!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMTDCsDA1JzIyLjAiTiA3NsKwMjInNTEuNSJF!5e0!3m2!1sen!2sin!4v1640000000000"></iframe>
            </div>
        </main>
    </div>

    <script>
        const targetDate = new Date("May 13, 2026 09:45:00").getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff < 0) {
                document.getElementById("countdown").innerHTML = "<div class='venue'><b> HAPPENING NOW! </b></div>";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("mins").innerText = m.toString().padStart(2, '0');
            document.getElementById("secs").innerText = s.toString().padStart(2, '0');
        }
        
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
